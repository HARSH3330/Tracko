<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Tracko Parts</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="/styles/variables.css">
  <link rel="stylesheet" href="/styles/main.css">
  <link rel="stylesheet" href="/styles/components.css">
  <link rel="stylesheet" href="/styles/pages.css">
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 50%, #16213e 100%);
      padding: var(--space-lg);
    }

    .login-card {
      background: #fff;
      border-radius: var(--radius-xl);
      padding: var(--space-3xl) var(--space-2xl);
      width: 100%;
      max-width: 440px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.4);
      text-align: center;
    }

    .login-card__logo {
      font-size: 2rem;
      font-weight: var(--fw-bold);
      letter-spacing: var(--ls-tight);
      color: var(--color-dark);
      margin-bottom: var(--space-xs);
    }

    .login-card__logo span {
      color: var(--color-primary);
    }

    .login-card__subtitle {
      font-size: var(--fs-small);
      color: var(--color-text-light);
      margin-bottom: var(--space-2xl);
    }

    .login-card .form-group {
      text-align: left;
    }

    .login-card .form-input {
      height: 50px;
      font-size: var(--fs-body);
    }

    .login-error {
      background: #FEF2F2;
      color: #DC2626;
      padding: var(--space-sm) var(--space-md);
      border-radius: var(--radius-md);
      font-size: var(--fs-small);
      margin-bottom: var(--space-lg);
      display: none;
    }

    .login-error.show {
      display: block;
    }

    .login-card__footer {
      margin-top: var(--space-xl);
      font-size: var(--fs-xs);
      color: var(--color-text-muted);
    }

    .login-card__footer a {
      color: var(--color-primary);
      text-decoration: none;
    }

    .login-card__lock {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--color-primary), #c62828);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto var(--space-lg);
    }

    .login-card__lock svg {
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-card__lock">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <div class="login-card__logo">TRACK<span>O</span></div>
      <p class="login-card__subtitle">Admin Dashboard Login</p>

      <div class="login-error" id="login-error">Invalid username or password</div>

      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input type="text" class="form-input" id="username" required placeholder="Enter username" autocomplete="username" autofocus>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" class="form-input" id="password" required placeholder="Enter password" autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn--primary btn--lg" id="login-btn" style="width:100%;margin-top:var(--space-sm)">
          Sign In
        </button>
      </form>

      <p class="login-card__footer">
        <a href="/">← Back to Website</a>
      </p>
    </div>
  </div>

  <script>
    // If already logged in, redirect to admin
    if (localStorage.getItem('tracko_admin_token')) {
      window.location.href = '/admin.html';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errorEl = document.getElementById('login-error');
      errorEl.classList.remove('show');
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
          })
        });

        const data = await res.json();

        if (res.ok && data.token) {
          localStorage.setItem('tracko_admin_token', data.token);
          window.location.href = '/admin.html';
        } else {
          errorEl.textContent = data.error || 'Invalid credentials';
          errorEl.classList.add('show');
          btn.disabled = false;
          btn.textContent = 'Sign In';
        }
      } catch (err) {
        errorEl.textContent = 'Connection error. Please try again.';
        errorEl.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }
  </script>
</body>
</html>
